apiVersion: apps/v1
kind: Deployment
metadata:
  name: website-klinik
spec:
  replicas: 2
  selector:
    matchLabels:
      app: website-klinik
  template:
    metadata:
      labels:
        app: website-klinik
    spec:
      containers:
        - name: website-klinik
          image: "riqimaruq/website-klinik:4"
          imagePullPolicy: Always
          ports:
            - containerPort: 80
