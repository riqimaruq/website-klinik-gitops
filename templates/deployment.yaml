apiVersion: apps/v1
kind: Deployment
metadata:
name: website-klinik
spec:
replicas: {{ .Values.replicaCount }}
selector:
matchLabels:
app: website-klinik
template:
metadata:
labels:
app: website-klinik
spec:
containers:
- name: website-klinik
image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
imagePullPolicy: {{ .Values.image.pullPolicy }}
ports:
- containerPort: 80
